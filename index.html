<!DOCTYPE html>
<html>
<head>
    <title>Balaton Teszt - Siófok</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #b3d1ff; }
        .hud { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            padding: 12px; font-family: 'Courier New', monospace; 
            z-index: 1000; border-radius: 8px; border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">TESZT ÜZEMMÓD</div>
    <div id="map"></div>

   <script>
        // Ez a két pont a "horgony". 
        // A te mérésed Tihanynál: 46.88872, 17.89172
        // Ehhez igazítjuk az SVG keretét.
        
        var northWest = [47.1050, 17.1500]; 
        var southEast = [46.6600, 18.1450];
        var bounds = [northWest, southEast];

        var map = L.map('map', { maxZoom: 22 }).fitBounds(bounds);

        // Az SVG betöltése
        L.imageOverlay('balaton.svg', bounds).addTo(map);

        // FIX KÉK PÖTTY (A valóság)
        var tihanyGPS = [46.88872, 17.89172];
        L.circleMarker(tihanyGPS, {
            radius: 8, fillColor: "#007bff", color: "#fff", weight: 2, fillOpacity: 1
        }).addTo(map).bindPopup("Tihanyi Rév móló vége (GPS)").openPopup();

        // HUD - Itt fogod látni, hova kattintasz az SVG-n
        map.on('click', function(e) {
            document.getElementById('hud').innerHTML = 
                "SVG PONT:<br>LAT: " + e.latlng.lat.toFixed(6) + "<br>LON: " + e.latlng.lng.toFixed(6);
            console.log("Kattintott koordináta: " + e.latlng.lat + ", " + e.latlng.lng);
        });
    </script>

</body>
</html>
