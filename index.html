<!DOCTYPE html>
<html>
<head>
    <title>Balaton Teszt - Siófok</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #b3d1ff; }
        .hud { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            padding: 12px; font-family: 'Courier New', monospace; 
            z-index: 1000; border-radius: 8px; border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">TESZT ÜZEMMÓD</div>
    <div id="map"></div>

    <script>
        // Ezek a koordináták határozzák meg, hol van az SVG bal-felső és jobb-alsó sarka
        // Ha a térkép el van csúszva, ezeket a számokat kell picit finomítani
        var northWest = [47.1050, 17.1500]; 
        var southEast = [46.6600, 18.1450];
        var bounds = [northWest, southEast];

        var map = L.map('map', {
            maxZoom: 22,
            zoomSnap: 0.1
        }).fitBounds(bounds);

        // Az SVG réteg hozzáadása
        L.imageOverlay('balaton.svg', bounds).addTo(map);

        // --- FIX POZÍCIÓ TESZTELÉSHEZ ---
        // Siófok, Hajóállomás környéke
        var testLat = 46.91500;
        var testLon = 18.05000;

        var marker = L.circleMarker([testLat, testLon], {
            radius: 10,
            fillColor: "#ff0000", // Piros pötty a teszthez
            color: "#ffffff",
            weight: 3,
            fillOpacity: 1
        }).addTo(map);

        // HUD frissítése a fix adatokkal
        document.getElementById('hud').innerHTML = 
            "FIX PONT: SIÓFOK<br>" +
            "LAT: " + testLat.toFixed(5) + "<br>" +
            "LON: " + testLon.toFixed(5);

        // Odaugrunk a piros pöttyre, hogy rögtön lásd
        map.setView([testLat, testLon], 15);

        // Interaktív teszt: Ha rákattintasz a térképre, oda ugrik a pötty 
        // és kiírja a koordinátát. Így ellenőrizheted a stégeket!
        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('hud').innerHTML = 
                "KIJELÖLT PONT:<br>" +
                "LAT: " + e.latlng.lat.toFixed(5) + "<br>" +
                "LON: " + e.latlng.lng.toFixed(5);
        });
    </script>
</body>
</html>
