<!DOCTYPE html>
<html>
<head>
    <title>Balaton Teszt - Badacsony & Tihany</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #b3d1ff; }
        .hud { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            padding: 12px; font-family: 'Courier New', monospace; 
            z-index: 1000; border-radius: 8px; border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">BADACSONY TESZT</div>
    <div id="map"></div>

<script>
    // Kalibrált határok az SVG-hez
    var northWest = [47.10607, 17.19512]; 
    var southEast = [46.66107, 18.19012];
    var bounds = [northWest, southEast];

    var map = L.map('map', {
        maxZoom: 22,
        zoomSnap: 0.1
    }).fitBounds(bounds);

    // 1. OPENSTREETMAP INTEGRÁCIÓ (Az igazi térkép alulra)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 2. A TE RAJZOD (SVG Overlay - átlátszósággal, hogy lásd az alatta lévő térképet)
    L.imageOverlay('balaton.svg', bounds, { opacity: 0.6 }).addTo(map);

    // --- 1. ELLENŐRZŐ PONT: TIHANY ---
    var tihanyGPS = [46.88872, 17.89172];
    L.circleMarker(tihanyGPS, {
        radius: 8, fillColor: "#00ff00", color: "#ffffff", weight: 2, fillOpacity: 1
    }).addTo(map).bindPopup("Tihanyi Rév");

    // --- 2. ELLENŐRZŐ PONT: BADACSONY (ÚJ) ---
    var badacsonyGPS = [46.78470, 17.50110];
    L.circleMarker(badacsonyGPS, {
        radius: 10,
        fillColor: "#ffff00", // Sárga = Új tesztpont
        color: "#000000",
        weight: 3,
        fillOpacity: 1
    }).addTo(map).bindPopup("Badacsonyi kikötő vége");

    // --- VALÓDI GPS POZÍCIÓ ---
    var marker = L.circleMarker([0,0], {
        radius: 10, fillColor: "#007bff", color: "#fff", weight: 3, fillOpacity: 1
    }).addTo(map);

    map.locate({setView: false, watch: true, enableHighAccuracy: true});

    map.on('locationfound', function(e) {
        marker.setLatLng(e.latlng);
        document.getElementById('hud').innerHTML = 
            "GPS POZÍCIÓ:<br>LAT: " + e.latlng.lat.toFixed(5) + "<br>LON: " + e.latlng.lng.toFixed(5);
    });

    map.on('click', function(e) {
        console.log("Kattintott hely: " + e.latlng.lat + ", " + e.latlng.lng);
        document.getElementById('hud').innerHTML = 
            "ELLENŐRZÉS:<br>LAT: " + e.latlng.lat.toFixed(5) + "<br>LON: " + e.latlng.lng.toFixed(5);
    });
</script>
</body>
</html>
