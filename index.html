<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Balaton GPS Teszt</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #f0f0f0; }
        .info-box {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="info-box">
        <b>ESP32 Hajó Pozíció Teszt</b><br>
        Státusz: <span id="status">GeoJSON betöltése...</span>
    </div>
    <div id="map"></div>

    <script>
        // 1. Térkép inicializálása (Középpont: Tihany környéke)
        var map = L.map('map').setView([46.88, 17.89], 11);

        // 2. A letöltött GeoJSON réteg betöltése (A Balaton medre)
        fetch('export-3.geojson')
            .then(response => response.json())
            .then(geojsonData => {
                L.geoJSON(geojsonData, {
                    style: {
                        color: "#0074D9",    // Partvonal színe
                        weight: 2,           // Vonalvastagság
                        fillColor: "#7FDBFF", // Víz színe
                        fillOpacity: 0.5     // Átlátszóság
                    }
                }).addTo(map);
                document.getElementById('status').innerText = "Hajó követése aktív";
            })
            .catch(err => {
                console.error("Hiba a GeoJSON betöltésekor:", err);
                document.getElementById('status').innerText = "Hiba: GeoJSON nem található!";
            });

        // 3. TESZT: Tihanyi rév északi pont (koordináták: 46.9015, 17.8962)
        // Az ESP32-től kapott koordinátákat ugyanígy [lat, lng] formátumban kell megadni
        var hlat = 46.888722;
        var hlng = 17.891722;

        var hajoIcon = L.circleMarker([hlat, hlng], {
            radius: 8,
            fillColor: "#FF4136", // Piros pötty
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8
        }).addTo(map);

        hajoIcon.bindPopup("<b>ESP32 Hajó</b><br>Tihanyi Rév (Észak)").openPopup();

    </script>
</body>
</html>
