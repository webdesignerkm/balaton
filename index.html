<!DOCTYPE html>
<html>
<head>
    <title>Balaton Teszt - Siófok</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #b3d1ff; }
        .hud { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            padding: 12px; font-family: 'Courier New', monospace; 
            z-index: 1000; border-radius: 8px; border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">TESZT ÜZEMMÓD</div>
    <div id="map"></div>

    <script>
        // Alaptérkép - Tihanyra fókuszálva
        var map = L.map('map', {
            maxZoom: 22,
            zoomSnap: 0.1
        }).setView([46.8887, 17.8917], 17);

        // A GeoJSON (a te SVG-dből konvertált vonalak) stílusa
        var myStyle = {
            "color": "#ff3300", // Erősebb narancsvörös, hogy jól látszódjon
            "weight": 2,
            "opacity": 1
        };

        // 1. A GeoJSON betöltése a GitHubról
        fetch('balaton.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: myStyle
                }).addTo(map);
                console.log("A vektoros adatok betöltve!");
            })
            .catch(err => console.error("Hiba a GeoJSON betöltésekor:", err));

        // 2. FIX TESZTPONT: Tihanyi Rév északi mólócsúcs
        // 46°53'19.4"N 17°53'30.2"E
        var testLat = 46.88872;
        var testLon = 17.89172;

        var marker = L.circleMarker([testLat, testLon], {
            radius: 10,
            fillColor: "#007bff", // Kék pötty a teszthez
            color: "#fff",
            weight: 3,
            fillOpacity: 1
        }).addTo(map);

        // HUD frissítése
        document.getElementById('hud').innerHTML = 
            "TESZT: TIHANY ÉSZAKI MÓLÓ<br>" +
            "LAT: " + testLat.toFixed(5) + "<br>" +
            "LON: " + testLon.toFixed(5);

        // Kattintás funkció (hogy tudd tesztelni a többi stéget is)
        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('hud').innerHTML = 
                "KIJELÖLT GPS:<br>" +
                "LAT: " + e.latlng.lat.toFixed(5) + "<br>" +
                "LON: " + e.latlng.lng.toFixed(5);
            console.log("Kattintott koordináta: " + e.latlng.lat + ", " + e.latlng.lng);
        });
    </script>

</body>
</html>
