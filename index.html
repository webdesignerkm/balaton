<!DOCTYPE html>
<html>
<head>
    <title>Balaton Teszt - Siófok</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #b3d1ff; }
        .hud { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            padding: 12px; font-family: 'Courier New', monospace; 
            z-index: 1000; border-radius: 8px; border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">TESZT ÜZEMMÓD</div>
    <div id="map"></div>

  <script>
    // A számításaim alapján a Te SVG-dhez ezek a pontos határok kellenek, 
    // hogy a mólód a helyére kerüljön:
    var northWest = [47.11451, 17.16432]; 
    var southEast = [46.66951, 18.15932];
    var bounds = [northWest, southEast];

    var map = L.map('map', {
        maxZoom: 22,
        zoomSnap: 0.1
    }).fitBounds(bounds);

    // Az SVG réteg betöltése
    L.imageOverlay('balaton.svg', bounds).addTo(map);

    // --- ELLENŐRZŐ PONT (Tihanyi móló) ---
    var tihanyGPS = [46.88872, 17.89172];
    var marker = L.circleMarker(tihanyGPS, {
        radius: 8,
        fillColor: "#00ff00", // Zöld pötty = Valódi GPS hely
        color: "#ffffff",
        weight: 2,
        fillOpacity: 1
    }).addTo(map).bindPopup("Tihanyi Rév (Valóság)");

    // --- VALÓDI GPS BEKAPCSOLÁSA ---
    // Ez mutatja majd, hol vagy Te a vízen
    var userMarker = L.circleMarker([0,0], {
        radius: 10, fillColor: "#007bff", color: "#fff", weight: 3, fillOpacity: 1
    }).addTo(map);

    map.locate({setView: false, watch: true, enableHighAccuracy: true});

    map.on('locationfound', function(e) {
        userMarker.setLatLng(e.latlng);
        document.getElementById('hud').innerHTML = 
            "GPS AKTÍV<br>" +
            "LAT: " + e.latlng.lat.toFixed(5) + "<br>" +
            "LON: " + e.latlng.lng.toFixed(5);
    });

    // Debug: Ha kattintasz, kiírja a koordinátát az ellenőrzéshez
    map.on('click', function(e) {
        console.log("Kattintott hely: " + e.latlng.lat + ", " + e.latlng.lng);
        document.getElementById('hud').innerHTML = 
            "PONT ELLENŐRZÉSE:<br>LAT: " + e.latlng.lat.toFixed(5) + "<br>LON: " + e.latlng.lng.toFixed(5);
    });
</script>

</body>
</html>
