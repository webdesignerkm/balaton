<!DOCTYPE html>
<html>
<head>
    <title>Balaton Teszt - Siófok</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #b3d1ff; }
        .hud { 
            position: absolute; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #00ff00; 
            padding: 12px; font-family: 'Courier New', monospace; 
            z-index: 1000; border-radius: 8px; border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="hud" id="hud">TESZT ÜZEMMÓD</div>
    <div id="map"></div>
<script>
        // Alaptérkép beállítása (Siófok/Tihany közé)
        var map = L.map('map', {
            maxZoom: 22
        }).setView([46.89, 17.95], 12);

        // A GeoJSON stílusa (milyen színű legyen a vonal?)
        var myStyle = {
            "color": "#ff7800",
            "weight": 3,
            "opacity": 0.65
        };

        // 1. A GeoJSON fájl betöltése
        fetch('balaton.geojson')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                // Ráillesztjük a térképre a vektort
                L.geoJSON(data, {
                    style: myStyle
                }).addTo(map);
                console.log("GeoJSON sikeresen betöltve!");
            })
            .catch(function(error) {
                console.log("Hiba a GeoJSON betöltésekor: " + error);
            });

        // 2. GPS követés (hogy lásd magad a vektoros térképen)
        var marker = L.circleMarker([0,0], {
            radius: 8, fillColor: "#007bff", color: "#fff", weight: 2, fillOpacity: 1
        }).addTo(map);

        map.locate({setView: false, watch: true, enableHighAccuracy: true});

        map.on('locationfound', function(e) {
            marker.setLatLng(e.latlng);
            document.getElementById('hud').innerHTML = 
                "GPS AKTÍV<br>LAT: " + e.latlng.lat.toFixed(5) + "<br>LON: " + e.latlng.lng.toFixed(5);
        });

        // Kattintásra koordináta (ellenőrzéshez)
        map.on('click', function(e) {
            console.log("Kattintott GPS: " + e.latlng.lat + ", " + e.latlng.lng);
        });
    </script>

</body>
</html>
